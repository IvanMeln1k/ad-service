version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    build: .
    command: alembic upgrade head
    environment:
      DB_USER: postgres
      DB_PASS: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: auth_service
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    command: uvicorn cmd.server.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DB_USER: postgres
      DB_PASS: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: auth_service
      JWT_SECRET: your-secret-key-change-in-production
      ACCESS_TOKEN_TTL: 3600
      REFRESH_TOKEN_TTL: 2592000
    depends_on:
      - migrations
    ports:
      - "8000:8000"

volumes:
  db_data: