version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    command: uvicorn cmd.server.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      - migrations
    ports:
      - "8000:8000"

volumes:
  db_data: