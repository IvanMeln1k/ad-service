services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-profiler_service}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-profiler_service}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    command: uvicorn app.server.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "8001:8000"
    depends_on:
      migrations:
        condition: service_completed_successfully

volumes:
  db_data:
