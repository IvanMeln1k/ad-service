resolver 127.0.0.11 valid=10s;

server {
    listen 3000;

    location /api/ {
        set $backend_registrator registrator:8000;
        proxy_pass http://$backend_registrator;
        proxy_set_header Host $host;
    }

    location /s3/ {
        set $backend_minio minio:9000;
        rewrite ^/s3/(.*)$ /$1 break;
        proxy_pass http://$backend_minio;
        proxy_set_header Host minio:9000;
        client_max_body_size 20m;
    }

    location /ads-api/ {
        set $backend_adser adser:8000;
        rewrite ^/ads-api/(.*)$ /api/$1 break;
        proxy_pass http://$backend_adser;
        proxy_set_header Host $host;
    }

    location = /robots.txt {
        set $backend_adser adser:8000;
        proxy_pass http://$backend_adser/api/v1/seo/robots.txt;
        proxy_set_header Host $host;
    }

    location = /sitemap.xml {
        set $backend_adser adser:8000;
        proxy_pass http://$backend_adser/api/v1/seo/sitemap.xml;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
